<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    div {
      /* align-items实际上就是设置侧轴上子元素的排列方式 */
      display: flex;
      width: 800px;
      height: 400px;
      background-color: pink;
      /* 默认的主轴是 x 轴 row */
      flex-direction: column;
      justify-content: center;
      /* 我们需要一个侧轴居中 */
      /* 拉伸，但是子盒子不要给高度 ,沿着侧轴去拉伸*/
      /* align-items: stretch; */
      align-items: center;
      /* align-content: center; */
    }

    div span {
      width: 150px;
      height: 100px;
      background-color: purple;
      color: #fff;
      margin: 10px;
    }
  </style>
</head>

<body>
  <div>
    <span>1</span>
    <span>2</span>
    <span>3</span>
  </div>
</body>

</html>
