<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    div {
      /* flex默认子元素不换行，如果放不开，会缩小子元素的宽度，放到父元素里面 */
      /* flex-wrap另起一行来显示 */
      display: flex;
      width: 600px;
      height: 400px;
      background-color: pink;
    }

    div span {
      width: 150px;
      height: 100px;
      background-color: purple;
      color: aliceblue;
      margin: 10px;
    }
  </style>
</head>

<body>
  <div>
    <span>1</span>
    <span>2</span>
    <span>3</span>
    <span>4</span>
  </div>
</body>

</html>
